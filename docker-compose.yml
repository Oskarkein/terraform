services:
  backend-dev:
    build: .
    container_name: backend-dev
    ports:
      - "8081:8080"

  backend-prod:
    build: .
    container_name: backend-prod
    ports:
      - "8082:8080"

  db:
    image: postgres:15
    container_name: postgres-backend
    environment:
      POSTGRES_DB: backenddb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    container_name: adminer-backend
    ports:
      - "8080:8080"
    depends_on:
      - db